services:
  - type: web
    name: eco-escuela-api
    runtime: node
    region: oregon
    plan: free
    nodeVersion: 20
    buildCommand: npm install -g pnpm@10 && pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/db run push && pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: eco-escuela-db
          property: connectionString

databases:
  - name: eco-escuela-db
    plan: free
    region: oregon
