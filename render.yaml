services:
  - type: web
    name: eco-escuela-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm@10 && pnpm install --filter @workspace/db --filter @workspace/api-zod
    startCommand: pnpm --filter @workspace/db run push && node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: eco-escuela-db
          property: connectionString

databases:
  - name: eco-escuela-db
    plan: free
    region: oregon
