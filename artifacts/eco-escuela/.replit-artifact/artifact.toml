kind = "mobile"
previewPath = "/"
title = "Eco Escuela"
version = "1.0.0"
id = "artifacts/eco-escuela"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20993

[services.development]
run = "pnpm --filter @workspace/eco-escuela run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/eco-escuela", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/eco-escuela", "run", "serve" ]

[services.env]
PORT = "20993"
BASE_PATH = "/"
